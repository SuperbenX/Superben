
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>息 - 请你好好睡觉</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-deep: #0f0f10;
            --bg-main: #1a1a1c;
        }
        body {
            background: #0f0f10;
            background-attachment: fixed;
            color: #888888;
            -webkit-tap-highlight-color: transparent;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        .app-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 40%, #1e1e21 0%, #0f0f10 100%);
            z-index: -2;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.03;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes breathe {
          0%, 100% { opacity: 0.3; transform: scale(1); filter: blur(0px); }
          50% { opacity: 0.6; transform: scale(1.03); filter: blur(1.5px); }
        }
        .animate-breathe { animation: breathe 8s ease-in-out infinite; }
        
        @keyframes glow {
          0%, 100% { box-shadow: 0 0 10px rgba(255,255,255,0.01); }
          50% { box-shadow: 0 0 30px rgba(255,255,255,0.04); }
        }
        .glow-breathe { animation: glow 6s ease-in-out infinite; }

        .sinking-transition {
          transition: filter 2s cubic-bezier(0.4, 0, 0.2, 1), opacity 2s ease, transform 2s ease;
        }
        .sinking-active {
          filter: blur(30px) brightness(0.5);
          opacity: 0;
          transform: scale(0.9) translateY(40px);
        }

        ::-webkit-scrollbar { display: none; }
        .scroll-container { -webkit-overflow-scrolling: touch; }
        
        .no-scrollbar::-webkit-scrollbar {
          display: none;
        }
    </style>
<script type="importmap">
{

  }
}
</script>

</head>

</html>
